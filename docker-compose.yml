services:
  automation:
    build: .
    restart: unless-stopped
    ports:
      - "${HEALTH_CHECK_PORT:-8126}:${HEALTH_CHECK_PORT:-8126}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./credentials:/app/credentials
      - ./workflows.json:/app/workflows.json
      - ./dashboard-activity.json:/app/dashboard-activity.json
    environment:
      - SHEET_ID
      - WORKSHEET_NAME
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/service-account.json
      - BUFFER_ACCESS_TOKEN
      - BUFFER_CHANNEL_ID
      - POLLING_INTERVAL_SECONDS
      - HEALTH_CHECK_PORT
      - DASHBOARD_PASSWORD
